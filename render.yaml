services:
  - type: web
    name: noa-tennis-booking
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: BOOKING_YEAR
        value: "2026"
      - key: DATA_DIR
        value: /var/data
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
    disks:
      - name: noa-tennis-data
        mountPath: /var/data
        sizeGB: 1
